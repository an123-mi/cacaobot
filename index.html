distinga a simple vista Moniliasis,\n  Pudricion negra y Escoba de bruja, que son los tres problemas de\n  mayor impacto economico en la zona\n- Metodologia sugerida: recorrido guiado por el lote senalando ejemplos\n  reales de cada sintoma, apoyado con el banco de preguntas frecuentes\n  de la seccion 15 como guion de conversacion\n- Indicador de exito: el agricultor logra identificar correctamente al\n  menos 8 de 10 casos presentados durante la practica de campo"}, {"title": "21.2 MODULO 2: COSECHA OPORTUNA Y MANEJO CULTURAL BASICO", "text": "21.2 MODULO 2: COSECHA OPORTUNA Y MANEJO CULTURAL BASICO\n- Objetivo: que el agricultor incorpore la cosecha cada 7-15 dias segun\n  la epoca, y la eliminacion inmediata de mazorcas enfermas, como habito\n  rutinario de la finca\n- Metodologia sugerida: comparar en campo un lote con cosecha oportuna\n  frente a un lote descuidado para visualizar la diferencia en incidencia\n- Indicador de exito: reduccion medible de mazorcas enfermas acumuladas\n  en el lote tras 2-3 ciclos de cosecha"}, {"title": "21.3 MODULO 3: USO SEGURO DE AGROQUIMICOS", "text": "21.3 MODULO 3: USO SEGURO DE AGROQUIMICOS\n- Objetivo: que el agricultor use el equipo de proteccion personal de\n  forma correcta y respete los periodos de carencia y reingreso\n- Metodologia sugerida: demostracion practica de calibracion de bomba\n  de espalda y triple lavado de envases vacios\n- Indicador de exito: el agricultor puede explicar, en sus propias\n  palabras, por que debe respetar el periodo de carencia antes de cosechar"}, {"title": "21.4 MODULO 4: USO DE LA HERRAMIENTA DIGITAL (CACAOBOT)", "text": "21.4 MODULO 4: USO DE LA HERRAMIENTA DIGITAL (CACAOBOT)\n- Objetivo: que el agricultor o tecnico de campo sepa formular preguntas\n  claras a CacaoBot describiendo sintomas (parte de la planta, color,\n  forma de la mancha, condiciones climaticas recientes) para obtener un\n  diagnostico mas preciso\n- Metodologia sugerida: practica guiada con casos reales del banco de\n  preguntas frecuentes antes de usar la herramienta de forma autonoma\n\n═══════════════════════════════════════════════════════════\n22. ANEXO: NIVELES DE URGENCIA Y PRIORIZACION DE RESPUESTA\n═══════════════════════════════════════════════════════════\n\nEsta clasificacion ayuda a priorizar la respuesta del agricultor cuando\nse reportan varios problemas a la vez en la misma visita de campo."}, {"title": "22.1 URGENCIA ALTA (actuar en las siguientes 24-48 horas)", "text": "22.1 URGENCIA ALTA (actuar en las siguientes 24-48 horas)\n- Marchitez subita de toda la planta con sospecha de Mal de machete,\n  por riesgo de propagacion rapida mediante el vector\n- Incidencia de Moniliasis o Pudricion negra por encima del umbral\n  del 5% de mazorcas afectadas en epoca lluviosa\n- Plantas jovenes con defoliacion severa por hormigas cortadoras"}, {"title": "22.2 URGENCIA MEDIA (actuar en la siguiente semana)", "text": "22.2 URGENCIA MEDIA (actuar en la siguiente semana)\n- Focos iniciales de Escoba de bruja, Mal rosado o Telarana detectados\n  durante el monitoreo de rutina\n- Deficiencias nutricionales con sintomas claros pero sin afectacion\n  severa de la produccion todavia\n- Presencia de barrenador del tronco en pocos arboles aislados"}, {"title": "22.3 URGENCIA BAJA (programar en el calendario regular de manejo)", "text": "22.3 URGENCIA BAJA (programar en el calendario regular de manejo)\n- Manchas de alga o sintomas leves de trips y acaros sin dano economico\n  significativo\n- Necesidad de poda de mantenimiento de rutina sin sintomas de enfermedad\n- Ajustes preventivos de fertilizacion segun calendario anual"}, {"title": "22.4 CRITERIO GENERAL DE CACAOBOT AL RESPONDER", "text": "22.4 CRITERIO GENERAL DE CACAOBOT AL RESPONDER\n- Cuando el agricultor describe un sintoma que corresponde a un problema\n  de urgencia alta, CacaoBot debe indicar explicitamente que se trata de\n  una accion prioritaria e inmediata, ademas del diagnostico y manejo\n  recomendado\n- En problemas de urgencia media o baja, basta con dar el diagnostico y\n  la recomendacion de manejo dentro del flujo normal de respuesta\n\n═══════════════════════════════════════════════════════════\n23. INDICADORES CLAVE DE DESEMPENO FITOSANITARIO (KPIs) DE LA FINCA\n═══════════════════════════════════════════════════════════\n\nEstos indicadores permiten a un productor o tecnico medir objetivamente\nsi el manejo fitosanitario esta funcionando, en lugar de basarse solo\nen percepciones generales."}, {"title": "23.1 INDICADORES DE INCIDENCIA Y SEVERIDAD", "text": "23.1 INDICADORES DE INCIDENCIA Y SEVERIDAD\n- Porcentaje de incidencia: numero de mazorcas con sintomas dividido\n  entre el total de mazorcas observadas, multiplicado por 100\n- Porcentaje de severidad: proporcion del tejido afectado dentro de\n  cada mazorca o planta enferma, util para distinguir un foco inicial\n  de un foco avanzado\n- Tendencia de incidencia: comparar el porcentaje de incidencia entre\n  visitas consecutivas para saber si el problema esta aumentando o\n  disminuyendo tras una intervencion"}, {"title": "23.2 INDICADORES DE MANEJO CULTURAL", "text": "23.2 INDICADORES DE MANEJO CULTURAL\n- Frecuencia real de cosecha lograda frente a la frecuencia recomendada\n  para la epoca del ano (8-15 dias en lluvias, hasta 15 dias en seca)\n- Porcentaje de mazorcas enfermas efectivamente retiradas y destruidas\n  frente al total de mazorcas enfermas detectadas en el monitoreo\n- Cumplimiento del calendario de poda fitosanitaria (cada 3 meses)"}, {"title": "23.3 INDICADORES ECONOMICOS", "text": "23.3 INDICADORES ECONOMICOS\n- Costo de manejo fitosanitario por hectarea por ano, comparado contra\n  el costo referencial de 150-300 dolares/ha/ano de la seccion 12\n- Perdida estimada de produccion atribuible a Moniliasis u otras\n  enfermedades, expresada en quintales por hectarea por ano\n- Relacion costo-beneficio de pasar de manejo quimico exclusivo a un\n  esquema MIPE con componente biologico y cultural"}, {"title": "23.4 USO DE LOS KPIs EN LA TOMA DE DECISIONES", "text": "23.4 USO DE LOS KPIs EN LA TOMA DE DECISIONES\n- Si la incidencia de Moniliasis se mantiene por debajo del umbral del\n  5% durante varios ciclos, el esquema de manejo actual puede mantenerse\n- Si la incidencia sube de forma sostenida pese a aplicar las medidas\n  culturales, es senal de revisar la frecuencia de cosecha real, la\n  calidad de la poda de saneamiento o la necesidad de reforzar el\n  componente quimico o biologico del programa MIPE\n\n═══════════════════════════════════════════════════════════\nINSTRUCCIONES DE RESPUESTA\n═══════════════════════════════════════════════════════════\n- Responde SIEMPRE en espanol\n- Cuando el agricultor describa sintomas, DIAGNOSTICA directamente\n- Se claro, tecnico y practico; habla como agronomo de campo\n- Menciona siempre que parte de la planta afecta\n- Incluye al menos una recomendacion de manejo concreta\n- Respuestas entre 80-200 palabras, directas al punto\n- Si no sabes algo, dilo honestamente\n- No inventes enfermedades que no existen en cacao\n- Cita el contexto de El Carmen cuando sea relevante\n- NUNCA uses asteriscos (**) ni formato Markdown\n- No preguntes de vuelta al usuario; siempre da una respuesta util"}];

// ─────────────────────────────────────────────
//  MOTOR TF-IDF (JavaScript puro, sin librerías)
// ─────────────────────────────────────────────
const STOPWORDS = new Set([
  'de','la','el','en','y','a','los','las','se','del','que','un','una','con',
  'es','por','su','al','para','lo','como','mas','pero','sus','le','ya','o',
  'este','fue','si','sobre','entre','cuando','me','son','también','hay',
  'mi','te','nos','muy','sin','todo','esta','hasta','desde','nos','qué',
  'cómo','cuál','cuándo','dónde','porque','también','ser','estar','tiene',
  'han','ha','he','les','nos','lo','las','mi','tu','su','their'
]);

function tokenizar(txt) {
  return txt.toLowerCase().replace(/[^a-záéíóúñü\s]/g,'').split(/\s+/)
    .filter(t => t.length > 2 && !STOPWORDS.has(t));
}

// Pre-computar TF-IDF de los chunks
const DF = {};
const CHUNK_TOKS = CHUNKS.map(c => {
  const toks = tokenizar(c.title + ' ' + c.text);
  new Set(toks).forEach(t => DF[t] = (DF[t]||0)+1);
  return toks;
});
const N = CHUNKS.length;

function idf(t){ return Math.log((N+1)/((DF[t]||0)+1))+1; }

function vectorizar(toks) {
  const tf = {};
  toks.forEach(t => tf[t] = (tf[t]||0)+1);
  const vec = {};
  let norm = 0;
  for (const [t,c] of Object.entries(tf)) {
    const v = c * idf(t);
    vec[t] = v; norm += v*v;
  }
  norm = Math.sqrt(norm)||1;
  for (const t in vec) vec[t] /= norm;
  return vec;
}

const CHUNK_VECS = CHUNK_TOKS.map(vectorizar);

function coseno(v1, v2) {
  let s = 0;
  for (const [t,v] of Object.entries(v1)) if (v2[t]) s += v*v2[t];
  return s;
}

function buscar(query, k=5) {
  const qv = vectorizar(tokenizar(query));
  if (!Object.keys(qv).length) return [];
  const scored = CHUNK_VECS.map((cv,i) => [coseno(qv,cv),i])
    .filter(([s]) => s > 0)
    .sort((a,b) => b[0]-a[0])
    .slice(0,k);
  // devolver en orden original del documento (más coherente)
  return scored.map(([,i]) => i).sort((a,b)=>a-b).map(i => CHUNKS[i]);
}

// ─────────────────────────────────────────────
//  FORMATO DE RESPUESTA
// ─────────────────────────────────────────────
function formatearRespuesta(chunks, query) {
  if (!chunks.length) {
    return {
      texto: 'No encontré información específica sobre eso en mi base de conocimiento.\n\nPuedo ayudarte con enfermedades (moniliasis, escoba de bruja, pudrición negra), plagas, nutrición, podas, cosecha, poscosecha y costos de producción del cacao.',
      fuente: null
    };
  }

  // Si hay un chunk muy relevante, mostrar su contenido directamente
  const principal = chunks[0];
  let texto = principal.text;

  // Limpiar el texto: quitar líneas de separadores, limitar longitud
  texto = texto
    .replace(/[═─]{3,}/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();

  // Si hay más de un chunk relevante, agregar resumen al final
  if (chunks.length > 1) {
    const temas = chunks.slice(1).map(c => c.title.split(' ').slice(1).join(' '));
    texto += '\n\n📌 Temas relacionados: ' + temas.join(' · ');
  }

  return { texto, fuente: principal.title };
}

// ─────────────────────────────────────────────
//  ESTADO Y PERSISTENCIA
// ─────────────────────────────────────────────
let historial = []; // [{id, rol, texto, ts}]
let contadorId = 0;

function cargarHistorial() {
  try {
    const raw = localStorage.getItem('cacaobot_historial');
    if (raw) {
      const data = JSON.parse(raw);
      historial = data.historial || [];
      contadorId = data.contadorId || 0;
    }
  } catch(e) { historial = []; contadorId = 0; }
}

function guardarHistorial() {
  try {
    localStorage.setItem('cacaobot_historial', JSON.stringify({historial, contadorId}));
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  UI — RENDERIZADO DE MENSAJES
// ─────────────────────────────────────────────
const chatEl = document.getElementById('chat');
const txtEl  = document.getElementById('txt');
const btnEl  = document.getElementById('btn-send');

function hora(ts) {
  return new Date(ts).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
}

function agregarBurbuja(rol, texto, ts, fuente, id) {
  // Quitar bienvenida si existe
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (rol === 'usuario' ? 'user' : 'bot');
  wrap.dataset.id = id;

  const bub = document.createElement('div');
  bub.className = 'bubble' + (rol === 'error' ? ' error' : '');
  bub.textContent = texto;

  if (fuente) {
    const tag = document.createElement('span');
    tag.className = 'fuente';
    tag.textContent = '📖 ' + fuente;
    bub.appendChild(tag);
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = hora(ts);

  wrap.appendChild(bub);
  wrap.appendChild(time);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

function mostrarTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function quitarTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function renderizarTodo() {
  chatEl.innerHTML = '';
  if (!historial.length) {
    mostrarBienvenida();
    return;
  }
  historial.forEach(m => agregarBurbuja(m.rol, m.texto, m.ts, m.fuente, m.id));
}

function mostrarBienvenida() {
  chatEl.innerHTML = `
    <div id="welcome">
      <div class="ico">🌱</div>
      <h2>Hola, soy CacaoBot</h2>
      <p>Asistente fitosanitario de la<br>Granja Experimental ULEAM El Carmen</p>
      <p style="margin-top:8px;font-size:13px">Preguntas frecuentes:</p>
      <div class="chips">
        <div class="chip" onclick="preguntaRapida(this)">Moniliasis en mazorca</div>
        <div class="chip" onclick="preguntaRapida(this)">Escoba de bruja</div>
        <div class="chip" onclick="preguntaRapida(this)">Hojas amarillas</div>
        <div class="chip" onclick="preguntaRapida(this)">Costos de producción</div>
        <div class="chip" onclick="preguntaRapida(this)">Cómo podar el cacao</div>
        <div class="chip" onclick="preguntaRapida(this)">Plagas del cacao</div>
      </div>
    </div>`;
}

function preguntaRapida(el) {
  txtEl.value = el.textContent;
  ajustarAltura();
  enviar();
}

// ─────────────────────────────────────────────
//  LÓGICA DE ENVÍO Y RESPUESTA
// ─────────────────────────────────────────────
function enviar() {
  const msg = txtEl.value.trim();
  if (!msg) return;

  contadorId++;
  const ts = Date.now();
  const entrada = {id: contadorId, rol: 'usuario', texto: msg, ts, fuente: null};
  historial.push(entrada);
  agregarBurbuja('usuario', msg, ts, null, contadorId);

  txtEl.value = '';
  ajustarAltura();
  btnEl.disabled = true;
  mostrarTyping();

  // Pequeño delay para que se vea el "typing" y no parezca instantáneo
  setTimeout(() => {
    quitarTyping();

    const resultados = buscar(msg);
    const {texto, fuente} = formatearRespuesta(resultados, msg);

    contadorId++;
    const tsR = Date.now();
    const salida = {id: contadorId, rol: 'bot', texto, ts: tsR, fuente};
    historial.push(salida);
    agregarBurbuja('bot', texto, tsR, fuente, contadorId);
    guardarHistorial();
    btnEl.disabled = false;
    txtEl.focus();
  }, 600 + Math.random()*400);
}

// ─────────────────────────────────────────────
//  INPUT — auto-resize textarea
// ─────────────────────────────────────────────
function ajustarAltura() {
  txtEl.style.height = 'auto';
  txtEl.style.height = Math.min(txtEl.scrollHeight, 120) + 'px';
  btnEl.disabled = !txtEl.value.trim();
}

txtEl.addEventListener('input', ajustarAltura);
txtEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

// ─────────────────────────────────────────────
//  EXPORTAR CSV
// ─────────────────────────────────────────────
function exportarCSV() {
  if (!historial.length) { toast('No hay conversación para exportar'); return; }

  const filas = [['id','rol','mensaje','timestamp']];
  historial.forEach(m => {
    filas.push([m.id, m.rol, '"'+m.texto.replace(/"/g,'""')+'"',
      new Date(m.ts).toLocaleString('es')]);
  });

  const csv = filas.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'conversacion_cacaobot_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV descargado');
}

// ─────────────────────────────────────────────
//  LIMPIAR CONVERSACIÓN
// ─────────────────────────────────────────────
function pedirLimpiar() {
  abrirModal(
    '¿Limpiar conversación?',
    'Se borrarán todos los mensajes de esta sesión. El CSV no se puede recuperar una vez borrado.',
    () => {
      historial = [];
      contadorId = 0;
      guardarHistorial();
      renderizarTodo();
      cerrarModal();
      toast('Conversación borrada');
    }
  );
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function abrirModal(titulo, msg, onOk) {
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-ok').onclick = onOk;
  document.getElementById('modal-overlay').classList.add('open');
}
function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─────────────────────────────────────────────
//  MENÚ
// ─────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('menu-overlay').classList.toggle('open');
}

// ─────────────────────────────────────────────
//  ACERCA DE
// ─────────────────────────────────────────────
function mostrarAcercaDe() {
  abrirModal(
    'CacaoBot ULEAM',
    'Versión 1.0 — Granja Experimental El Carmen, Manabí.\n\nApp offline con base de conocimiento fitosanitario del cultivo de cacao. No requiere internet ni servidor.\n\nDesarrollado como herramienta de apoyo para técnicos de campo.',
    cerrarModal
  );
  document.querySelector('#modal .btns .cancel').style.display = 'none';
  setTimeout(()=>{ document.querySelector('#modal .btns .cancel').style.display=''; }, 100);
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
//  SERVICE WORKER
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ─────────────────────────────────────────────
//  INICIO
// ─────────────────────────────────────────────
cargarHistorial();
renderizarTodo();
</script>
</body>
</html>
